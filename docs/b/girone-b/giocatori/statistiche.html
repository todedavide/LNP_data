        }

        .sidebar-section.expanded .arrow {
            transform: rotate(90deg);
        }

        .sidebar-subsection {

            background: white;
            border-left-color: var(--tp-primary);
            color: var(--tp-secondary);

            padding: var(--tp-spacing-xl);

        .info-tooltip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            font-size: 13px;
            font-style: normal;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border-radius: 50%;
            cursor: help;
            margin-left: 8px;

            z-index: 1000;
            font-weight: 600;

        .info-tooltip:hover {
            transform: scale(1.1);
            z-index: 100000;
        }

            top: 100%;
            left: 50%;

            color: white;

            pointer-events: none;

                x: top10.map(r => r.value),

                yaxis: { automargin: true }
            };

        }

        initTabs();

                    title: { text: data.label + ' per minuto', font: { size: 14 } },
                    gridcolor: '#e5e5e5',
                    range: [0, 0.5],
                    tickformat: '.2f'
                },
                yaxis: {
                    title: { text: 'Efficienza (%)', font: { size: 14 } },
                    gridcolor: '#e5e5e5',
                    range: [0, 100]
                },
                shapes: [
                    { type: 'line', x0: data.avg_freq, x1: data.avg_freq, y0: 0, y1: 100, line: { dash: 'dash', color: 'gray', width: 1 } },
                    { type: 'line', x0: 0, x1: 0.5, y0: data.avg_pct, y1: data.avg_pct, line: { dash: 'dash', color: 'gray', width: 1 } }
                ],
                annotations: [
                    { x: 0.48, y: data.avg_pct + 3, text: 'Media: ' + data.avg_pct + '%', showarrow: false, font: { size: 11, color: 'gray' } }
                ],
                margin: { t: 20, b: 60, l: 70, r: 40 }
            };

            Plotly.newPlot('shots-chart-container', [trace], layout, { responsive: true });
        }

        showChart('3PT');
    </script>
