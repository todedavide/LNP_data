            font-size: 0.75rem;
        }

        .sidebar-section.expanded .arrow {
            transform: rotate(90deg);
        }

        .sidebar-subsection {

        .sidebar-section.expanded .sidebar-subsection {
            display: block;

            border-left-color: var(--tp-primary);
            color: var(--tp-secondary);

            font-size: 0.875rem;

            padding: var(--tp-spacing-xl);

        .info-tooltip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            font-size: 13px;
            font-style: normal;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border-radius: 50%;
            cursor: help;
            margin-left: 8px;
            vertical-align: middle;
            position: relative;
            z-index: 1000;
            font-weight: 600;

        }

        .info-tooltip:hover {
            transform: scale(1.1);
            z-index: 100000;
        }

            content: attr(data-tip);

            top: 100%;
            left: 50%;

            line-height: 1.5;
            pointer-events: none;

        function renderChart() {

                    { type: 'line', x0: 0, x1: 0.5, y0: data.avg_pct, y1: data.avg_pct, line: { dash: 'dash', color: 'gray', width: 1 } }
                ],
                annotations: [
                    { x: 0.48, y: data.avg_pct + 3, text: 'Media: ' + data.avg_pct + '%', showarrow: false, font: { size: 11, color: 'gray' } }
                ],
                margin: { t: 20, b: 60, l: 70, r: 40 }
            };

            Plotly.newPlot('shots-chart-container', [trace], layout, { responsive: true });
        }

        showChart('3PT');
    </script>
